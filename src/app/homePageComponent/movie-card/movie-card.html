<div
  class="group relative aspect-video overflow-hidden rounded-xl cursor-pointer"
>
  <img
    [src]="movie.image"
    [alt]="movie.title"
    class="h-full w-full object-cover transition duration-500 ease-out group-hover:scale-110 group-hover:brightness-50"
  />

  <div
    class="absolute inset-x-0 bottom-0 bg-gradient-to-t from-black via-black/60 to-transparent p-5 text-white"
  >
    <h3 class="text-xl font-bold">
      {{ movie.title }}
    </h3>

    <p
      class="mt-2 max-h-0 overflow-hidden text-sm opacity-0 transition-all duration-300 group-hover:max-h-32 group-hover:opacity-100"
    >
      {{ movie.description }}
    </p>
  </div>
</div>
