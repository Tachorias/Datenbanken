<main class="bg-gray-200 text-black flex items-center justify-center min-h-screen">
  <form
    class="flex flex-col gap-2"
    (ngSubmit)="anmelden()"
  >
    <h1 class="font-bold text-2xl">Nutzername</h1>
    <input
      class="text-xl border-2 rounded-xl px-2"
      type="text"
      name="benutzername"
      [(ngModel)]="benutzername"
    >

    <h1 class="font-bold text-2xl">Passwort</h1>
    <input
      class="text-xl border-2 rounded-xl px-2"
      type="password"
      name="passwort"
      [(ngModel)]="passwort"
    >

    @if (fehlermeldung) {
      <p class="text-red-600 font-bold">
        {{ fehlermeldung }}
      </p>
    }

    <button
      class="mt-4 bg-blue-600 text-white font-bold py-2 rounded-xl hover:bg-blue-700 transition"
      type="submit"
    >
      Login
    </button>
  </form>
</main>
